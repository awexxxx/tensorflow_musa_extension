name: CI Auto Rerun

on:
  workflow_run:
    workflows: ["CI Validation (MUSA GPU)"]
    types: [completed]

permissions:
  actions: write
  contents: read

env:
  MAX_AUTO_RERUNS: 5

jobs:
  rerun_failed_jobs:
    name: Auto Rerun Failed Jobs
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Re-run failed jobs when retry budget remains
        uses: actions/github-script@v7
        env:
          MAX_AUTO_RERUNS: ${{ env.MAX_AUTO_RERUNS }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runId = context.payload.workflow_run.id;
            const maxAutoReruns = Number(process.env.MAX_AUTO_RERUNS || "5");

            const { data: run } = await github.rest.actions.getWorkflowRun({
              owner,
              repo,
              run_id: runId,
            });

            const attempt = Number(run.run_attempt || 1);
            const rerunsUsed = Math.max(0, attempt - 1);

            core.info(
              `Run ${runId} conclusion=${run.conclusion} attempt=${attempt} rerunsUsed=${rerunsUsed}/${maxAutoReruns}`
            );

            if (run.conclusion !== "failure") {
              core.info("Run is not failed; skip auto rerun.");
              return;
            }

            if (rerunsUsed >= maxAutoReruns) {
              core.notice(
                `Run ${runId} already exhausted auto reruns (${rerunsUsed}/${maxAutoReruns}); leave final failure as-is.`
              );
              return;
            }

            await github.request(
              "POST /repos/{owner}/{repo}/actions/runs/{run_id}/rerun-failed-jobs",
              {
                owner,
                repo,
                run_id: runId,
              }
            );

            core.notice(
              `Triggered auto rerun for failed jobs of run ${runId} (${rerunsUsed + 1}/${maxAutoReruns}).`
            );
